version: "3.8"
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENV=${PINECONE_ENV}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - BASE_URL=${BASE_URL}
    volumes:
      - .:/app
